version: '3.8'

services:
  # Main Canopy node service
  canopy:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    container_name: canopy-node
    restart: unless-stopped
    ports:
      - "${P2P_PORT:-9000}:9000"       # P2P networking port
      - "${RPC_PORT:-50832}:50832"     # RPC API port
      - "${ADMIN_PORT:-50833}:50833"   # Admin API port
    volumes:
      - canopy-data:/root/.canopy
      - ./config:/root/.canopy/config:ro
    environment:
      - CANOPY_ENV=${CANOPY_ENV:-mainnet}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    networks:
      - canopy-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:50832/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Auto-update service (optional, enable via profile)
  auto-update:
    build:
      context: .docker/auto-update
      dockerfile: Dockerfile
    container_name: canopy-auto-update
    restart: unless-stopped
    profiles:
      - auto-update
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - canopy-data:/root/.canopy
    environment:
      - UPDATE_INTERVAL=${UPDATE_INTERVAL:-3600}
      - CANOPY_CONTAINER=canopy-node
      - REGISTRY=${REGISTRY:-ghcr.io}
      - IMAGE_TAG=${IMAGE_TAG:-latest}
    networks:
      - canopy-net
    depends_on:
      - canopy

volumes:
  canopy-data:
    driver: local
    name: canopy-data

networks:
  canopy-net:
    driver: bridge
    name: canopy-net
